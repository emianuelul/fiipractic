services:
  postgres:
    image: 'postgres:latest'
    container_name: postgres
    restart: unless-stopped
    environment:
      - 'POSTGRES_DB=fiipractic'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5435:5432'
    volumes:
      - ./postgres_data:/var/lib/postgresql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - stocks-network

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/fiipractic?currentSchema=keycloak
      KC_DB_USERNAME: keycloakuser
      KC_DB_PASSWORD: keycloakpassword
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
    ports:
      - '8082:8080'
    volumes:
      - ./realm-config/stock-realm.json:/opt/keycloak/data/import/stock-realm.json
    networks:
      - stocks-network
    depends_on:
      - postgres

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - '5672:5672'     # AMQP protocol
      - '15672:15672'   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - ./rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stocks-network

  logbull:
    container_name: logbull
    image: logbull/logbull:latest
    ports:
      - "4005:4005"
    volumes:
      - ./logbull-data:/logbull-data
    restart: unless-stopped
    networks:
      - stocks-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4005/api/v1/system/health" ]
      interval: 5s
      timeout: 5s
      retries: 30
    platform: linux/amd64

networks:
  stocks-network:
    driver: bridge