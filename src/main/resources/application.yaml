spring:
  application:
    name: stocks

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5435/fiipractic?currentSchema=stocks
    username: stocksuser
    password: stockspassword
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/stock

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin

alphavantage:
  api-key: ${ALPHA_VANTAGE_API_KEY}
  base-url: https://www.alphavantage.co/query

server:
  port: 8081